<!DOCTYPE html>
<html>
<head>
    <title>Exercise #4 - Christmas Tree</title>
</head>
<body>
    <h1>請開啟 Console 查看結果</h1>
    <script>
  function tree(n) {
    printTreeTop(n);
    printTreeBottom(n);
}

function printTreeTop(n) {
    for (let i = 0; i < n; i++) {
        let spaces = repeatchar(n - i - 1, ' ');
        let stars = repeatchar(2 * i + 1, '*');
        console.log(spaces + stars);
    }
}

function printTreeBottom(n) {
    for (let i = 0; i < 3; i++) {
        let spaces = repeatchar(n - 1, ' ');
        console.log(spaces + '*');
    }
}

function repeatchar(count, char) {
    let result = '';
    for (let i = 0; i < count; i++) {
        result += char;
    }
    return result;
}

tree(4);
        
        tree(4); 
    </script>
</body>
</html>
